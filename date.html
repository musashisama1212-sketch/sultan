<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Segoe UI;
background:linear-gradient(#87cefa,#dff3ff);
display:flex;
justify-content:center;
align-items:center;
}

/* BLACKOUT */

#blackout{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:999;
animation:fadeOut 1.5s forwards;
animation-delay:0.5s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* HOME BUTTON */

#homeBtn{
position:absolute;
top:20px;
left:20px;
padding:8px 14px;
background:rgba(20,20,30,.8);
color:white;
border-radius:8px;
cursor:pointer;
font-size:14px;
z-index:10;
}

/* ROAD */

#ground{
position:absolute;
bottom:0;
width:100%;
height:300px; /* increased to touch shop */
background:#666;
}

#ground::after{
content:"";
position:absolute;
top:140px;
width:100%;
height:6px;
background:repeating-linear-gradient(
90deg,
white 0px,
white 40px,
transparent 40px,
transparent 80px
);
}

/* SCENE */

#scene{
position:relative;
width:900px;
height:600px;
display:flex;
justify-content:center;
align-items:center;
}

/* SHOP */

#shop{
position:absolute;
bottom:300px; /* stays same */
width:240px;
border-radius:20px;
opacity:0;
transition:1s;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

/* POPSICLE */

#popsicle{
position:absolute;
bottom:200px;
width:90px;
height:190px;
border-radius:50px;
display:none;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.stripe{
position:absolute;
height:100%;
width:12px;
background:rgba(255,255,255,.6);
}

#s1{left:25px;}
#s2{right:25px;}

#stick{
position:absolute;
bottom:-45px;
left:50%;
transform:translateX(-50%);
width:18px;
height:45px;
background:#d8b48a;
border-radius:6px;
}

.bite{
position:absolute;
width:60px;
height:60px;
background:#666;
border-radius:50%;
}

/* DARK BOX */

.box{
background:rgba(20,20,30,.85);
color:white;
padding:18px 25px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,.4);
backdrop-filter:blur(10px);
}

#choiceBox{
position:absolute;
top:320px;
display:none;
flex-direction:column;
align-items:center;
gap:10px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#2b2b40;
color:white;
cursor:pointer;
}

#eatBtn{
position:absolute;
bottom:160px;
display:none;
}

#dialogue{
position:absolute;
bottom:230px;
display:none;
max-width:260px;
text-align:center;
}

#movieBox{
position:absolute;
bottom:260px;
display:none;
text-align:center;
}

</style>
</head>

<body>

<div id="blackout"></div>

<div id="homeBtn" onclick="goHome()">Home</div>

<div id="ground"></div>

<div id="scene">

<img id="shop" src="shop.png">

<div id="choiceBox" class="box">
<h3>Choose your ice cream</h3>
<button onclick="choose('strawberry')">Strawberry</button>
<button onclick="choose('chocolate')">Chocolate</button>
</div>

<div id="popsicle">
<div id="s1" class="stripe"></div>
<div id="s2" class="stripe"></div>
<div id="stick"></div>
</div>

<div id="dialogue" class="box"></div>

<div id="movieBox" class="box">
<p>movie dekhne chalein?</p>
<button onclick="goMovie()">let's gooo</button>
</div>

<button id="eatBtn" onclick="eat()">Eat</button>

</div>

<script>

/* ENTRY */

setTimeout(()=>{shop.style.opacity=1},1500)
setTimeout(()=>{choiceBox.style.display="flex"},2200)

/* BITES */

let biteIndex=0

const bites=[
{top:"-20px",left:"10px"},
{top:"-20px",left:"40px"},
{top:"20px",left:"25px"},
{top:"60px",left:"5px"},
{top:"60px",left:"45px"},
{top:"100px",left:"25px"}
]

function choose(type){

popsicle.style.background=
type==="strawberry" ? "#ff6b8a" : "#3b2a2a"

choiceBox.style.display="none"

setTimeout(()=>{
popsicle.style.display="block"
eatBtn.style.display="block"
},800)
}

function eat(){

if(biteIndex>=bites.length){
popsicle.style.display="none"
eatBtn.style.display="none"
dialogue.style.display="none"
return
}

if(biteIndex===0){
dialogue.innerText="tasty hai na ik"
dialogue.style.display="block"
}

if(biteIndex===1){
dialogue.style.display="none"
}

if(biteIndex===4){
movieBox.style.display="block"
}

let hole=document.createElement("div")
hole.className="bite"

hole.style.top=bites[biteIndex].top
hole.style.left=bites[biteIndex].left

popsicle.appendChild(hole)

biteIndex++
}

/* NAVIGATION */

function goMovie(){
window.location.href="movie.html"
}

function goHome(){
window.location.href="home.html"
}

</script>

</body>
</html>
